name: Deploy to Astronomer

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Astronomer
        uses: astronomer/deploy-action@v0.4
        with:
          deployment-id: ${{ secrets.ASTRONOMER_DEPLOYMENT_ID }}
          api-token: ${{ secrets.ASTRONOMER_API_TOKEN }}

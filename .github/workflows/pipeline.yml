name: Health Pipeline

on:
  schedule:
    - cron: "0 2 * * 0"   # every Sunday at 02:00 UTC (matches Airflow DAG schedule)
  workflow_dispatch:        # also allows manual "Run workflow" button in GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}   # Neon PostgreSQL connection string

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/processed

      - name: Upload places_full.csv to Neon for debugging
        run: python scripts/upload_places_debug.py

      - name: Run pipeline
        run: python run_pipeline.py

      - name: Upload raw data as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: data/processed/
          retention-days: 7
